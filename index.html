<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myntra Clone</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #ff3f6c;
      color: rgb(45, 43, 43);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .logo {
      font-size: 24px;
      font-weight: bold;
    }

    header nav {
      display: flex;
      gap: 15px;
    }

    header nav a {
      color: black;
      text-decoration: none;
      font-weight: bold;
    }

    .banner {
      background-image: url('https://indian-retailer.s3.ap-south-1.amazonaws.com/s3fs-public/2020-12/myn_final_image.jpg');
      background-size: cover;
      background-position: center;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgb(32, 25, 25);
      font-size: 36px;
      font-weight: bold;
    }

    .categories {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      background-color: #f9f9f9;
    }

    .category {
      text-align: center;
    }

    .category img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
    }

    .products {
      padding: 20px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .product {
      border: 1px solid #ddd;
      border-radius: 5px;
      overflow: hidden;
      text-align: center;
    }

    .product img {
      width: 100%;
    }

    .product h3 {
      padding: 10px 0;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 15px 0;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Myntra</div>
    <nav>
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Kids</a>
      <a href="#">Home & Living</a>
      <a href="#">Beauty</a>
    </nav>
  </header>

  <div class="banner">
    Welcome to Myntra Clone!
  </div>

  <section class="categories">
    <div class="category">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS73GPeJ8XsyHdFHprcuuwj-uUJcmjctKsk5w&s" alt="Men">
      <h3>Men</h3>
    </div>
    <div class="category">
      <img src="https://www.the420.in/wp-content/uploads/2021/01/Myntra-App.jpg" alt="Women">
      <h3>Women</h3>
    </div>
    <div class="category">
      <img src="https://english.cdn.zeenews.com/sites/default/files/1EXOVGOS_965316e2e60c49fe80c5492dcd59bd56.jpg" alt="Kids">
      <h3>Kids</h3>
    </div>
  </section>

  <section class="products">
    <h2>Featured Products</h2>
    <div class="product-grid">
      <div class="product">
        <img src="https://cdn0.desidime.com/cdn-cgi/image/fit=crop,f=auto,onerror=redirect,w=1200,h=1200,q=90/topics/photos/1393137/original/Myntra-Right-to-Fashion-Sale-2022--1200x1200.jpg" alt="Product 1">
        <h3>Product 1</h3>
      </div>
      <div class="product">
        <img src="https://mir-s3-cdn-cf.behance.net/project_modules/max_1200/d79ed9101313597.5f1be270b1041.jpg" alt="Product 2">
        <h3>Product 2</h3>
      </div>
      <div class="product">
        <img src="https://assets.myntassets.com/dpr_1.5,q_60,w_400,c_limit,fl_progressive/assets/images/2020/9/7/97763f84-6e49-41bb-80e0-9d8034006a4a1599481995876-Header-fin.jpg" alt="product 3">
        <h3>Product 3</h3>
      </div>
    </div>
  </section>

  <footer>
    &copy; 2025 Myntra Clone. All rights reserved.
  </footer>

</body>
</html>
