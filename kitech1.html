<html>
<head>
<title>Kitchen Rule Clone</title>

<style>

body{

<body>

<div class="navbar">
<h2>Kitchen Rule</h2>

<input type="text" placeholder="Search restaurants...">

<div class="nav-icons">
<span onclick="showPage('home')">🏠</span>
<span onclick="showPage('food')">🍔</span>
<span onclick="openOrders()">🛒</span>
</div>
</div>

<!-- HOME -->

<div id="home" class="page active">

<div class="header">
<h1>Discover the Best Food</h1>
<p>Order food from your favourite restaurants</p>
</div>

<div class="container">

<div class="card">
<img src="https://www.foodandwine.com/thmb/lsdCIVCX-n5IzWbAhHXluw8LJAM=/750x0/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/tomato-mozzarella-pizza-FT-RECIPE0725-e7244e979c504188a049623668c15b2e.jpg">
<h3>Pizza</h3>
<p class="rating">₹250</p>
<button class="btn" onclick="orderFood('Pizza',250)">Order Now</button>
<button class="cartBtn" onclick="addToCart('Pizza',250)">Add to Cart</button>
</div>

<div class="card">
<img src="https://png.pngtree.com/png-clipart/20221001/ourmid/pngtree-fast-food-big-ham-burger-png-image_6244235.png">
<h3>Burger</h3>
<p class="rating">₹150</p>
<button class="btn" onclick="orderFood('Burger',150)">Order Now</button>
<button class="cartBtn" onclick="addToCart('Burger',150)">Add to Cart</button>
</div>

<div class="card">
<img src="https://cdn.britannica.com/35/225835-050-A5CC289A/Indian-one-pot-meal-for-party.jpg">
<h3>Biryani</h3>
<p class="rating">₹220</p>
<button class="btn" onclick="orderFood('Biryani',220)">Order Now</button>
<button class="cartBtn" onclick="addToCart('Biryani',220)">Add to Cart</button>
</div>

</div>
</div>

<!-- FOOD PAGE -->

<div id="food" class="page">

<div class="header">
<h1>Food Menu</h1>
</div>

<div class="container">

<div class="card">
<img src="https://images.immediate.co.uk/production/volatile/sites/30/2021/04/Pasta-alla-vodka-f1d2e1c.jpg">
<h3>Pasta</h3>
<p class="rating">₹180</p>
<button class="btn" onclick="orderFood('Pasta',180)">Order Now</button>
<button class="cartBtn" onclick="addToCart('Pasta',180)">Add to Cart</button>
</div>

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROB01xjiyYDVv6Hs2ps6SmyRHrxmAEsL8thg&s">
<h3>Pav Bhaji</h3>
<p class="rating">₹120</p>
<button class="btn" onclick="orderFood('Pav Bhaji',120)">Order Now</button>
<button class="cartBtn" onclick="addToCart('Pav Bhaji',120)">Add to Cart</button>
</div>

</div>
</div>

<!-- ORDER POPUP -->

<div class="orderBox" id="orderBox">
<h3>Your Cart</h3>

<div id="orderList"></div>

<div class="total" id="totalPrice"></div>

<button class="closeBtn" onclick="closeOrders()">Close</button>

</div>

<script>

function showPage(page){
document.getElementById("home").classList.remove("active");
document.getElementById("food").classList.remove("active");
document.getElementById(page).classList.add("active");
}

let cart=[];
let total=0;

function addToCart(item,price){
cart.push({item,price});
total+=price;
alert(item+" added to cart");
}

function orderFood(item,price){
addToCart(item,price);
}

function openOrders(){

let list=document.getElementById("orderList");
list.innerHTML="";

cart.forEach(o=>{
list.innerHTML+=`<div class="orderItem">${o.item} <span>₹${o.price}</span></div>`;
});

document.getElementById("totalPrice").innerText="Total: ₹"+total;

document.getElementById("orderBox").style.display="block";

}

function closeOrders(){
document.getElementById("orderBox").style.display="none";
}

</script>

</body>
</html>
